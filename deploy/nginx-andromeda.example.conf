# Example snippet for Ubuntu nginx on 204.168.212.239
# Site: andromeda.andrescortes.dev (OrbiX / virtual-store-app static build)
#
# Option A (recommended for current static deploy): build the frontend with
#   VITE_API_BASE_URL=https://service.andromeda.andrescortes.dev
# and only serve static files (no /api block needed).
#
# Option B: keep VITE_API_BASE_URL=/api in the build and add this inside the server block:

location /api/ {
    proxy_pass https://service.andromeda.andrescortes.dev/;
    proxy_ssl_server_name on;
    proxy_set_header Host service.andromeda.andrescortes.dev;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Without Option A or B, /api/* returns index.html and the app falls back to mock events.
